<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N&J's Jewellery | Destiny in Every Gem</title>
    <!-- SEO -->
    <meta name="description" content="Unlock the cosmic powers of Vedic Navratan stones. Handpicked, energized, and ethically sourced luxury gemstones from Jaipur.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-primary: #0A0705;
            --bg-secondary: #130E09;
            --bg-tertiary: #1C1610;
            --gold-primary: #C9A84C;
            --gold-light: #E8CB7A;
            --gold-dark: #8A6D2F;
            --cream: #F5EDD6;
            --cream-dim: #B8A98A;
            --ruby: #9B1C1C;
            --emerald: #1B4D3E;
            --sapphire: #1B2A6B;
            --pearl: #F0EDE5;
            --coral: #B55A3A;
            --topaz: #C47A1E;
            --hessonite: #8B4513;
            --cats-eye: #8B8000;
            --border-gold: rgba(201,168,76,0.25);
            --glow-gold: rgba(201,168,76,0.15);
            --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Reset & Base */
        * { margin:0; padding:0; box-sizing:border-box; outline:none; -webkit-tap-highlight-color:transparent; }
        body { 
            background: var(--bg-primary); color: var(--cream); 
            font-family: 'Cormorant Garamond', serif; line-height: 1.6;
            overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }

        /* SVG Grain Overlay */
        body::before {
            content:""; position:fixed; inset:0; z-index:9999; pointer-events:none; opacity:0.03;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3BaseFilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/baseFilter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        h1, h2, h3, h4 { font-family: 'Playfair Display', serif; font-weight: 400; }
        .brand-font { font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 0.15em; font-size: 0.75rem; }
        .btn-gold { 
            padding: 12px 30px; font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.2em;
            border-radius: 50px; cursor: pointer; transition: var(--transition); border: 1px solid var(--gold-primary);
            background: transparent; color: var(--gold-primary); text-decoration: none; display: inline-block;
        }
        .btn-gold.fill { background: var(--gold-primary); color: var(--bg-primary); }
        .btn-gold:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--glow-gold); }
        .btn-gold.fill:hover { background: var(--gold-light); }

        /* Splash Gate */
        #splash-gate {
            position: fixed; inset: 0; z-index: 5000; background: var(--bg-primary);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; transition: opacity 0.6s ease;
        }
        #splash-canvas { position: absolute; inset: 0; pointer-events: none; }

        /* Navigation */
        nav {
            position: fixed; top: 0; width: 100%; height: 80px; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center; padding: 0 5%;
            background: rgba(10, 7, 5, 0.85); backdrop-filter: saturate(180%) blur(20px);
            transition: var(--transition);
        }
        nav.active { border-bottom: 1px solid var(--border-gold); }
        .logo { display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--cream); }
        .nav-links { display:flex; gap:35px; list-style:none; }
        .nav-links a { 
            text-decoration:none; color:var(--cream-dim); font-size:0.75rem; 
            letter-spacing:0.15em; font-family:'Cinzel', serif; position:relative; 
        }
        .nav-links a:hover, .nav-links a.active { color:var(--gold-primary); }
        .nav-links a::after {
            content:""; position:absolute; bottom:-5px; left:0; width:0; height:1px;
            background:var(--gold-primary); transition:var(--transition);
        }
        .nav-links a:hover::after { width:100%; }

        .nav-actions { display:flex; gap:20px; align-items:center; }
        .nav-icon { 
            background:none; border:none; color:var(--gold-primary); cursor:pointer; 
            position:relative; width:22px; height:22px; display:flex; align-items:center;
            transition: var(--transition);
        }
        .nav-icon:hover { color: var(--gold-light); transform: scale(1.1); }
        .badge {
            position:absolute; top:-8px; right:-8px; background:var(--ruby); color:white;
            font-size:0.6rem; width:16px; height:16px; border-radius:50%;
            display:flex; align-items:center; justify-content:center; font-family:'Cinzel', serif;
        }

        /* Views */
        #main-content { min-height: 100vh; padding-top: 80px; opacity: 1; transition: opacity 0.3s ease; }
        .view { display: none; width: 100%; }
        .view.active { display: block; animation: view-enter 0.5s ease forwards; }
        @keyframes view-enter {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hero */
        .hero { 
            height: calc(100vh - 80px); width:100%; display:flex; flex-direction:column;
            justify-content:center; align-items:center; text-align:center; position:relative;
            background: radial-gradient(circle at center, rgba(201,168,76,0.08) 0%, var(--bg-primary) 70%);
        }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); font-style: italic; margin-bottom: 20px; line-height: 1.1; }
        .hero p { font-size: 1.2rem; color: var(--cream-dim); max-width: 600px; margin-bottom: 40px; padding:0 20px; }
        #hero-canvas { position: absolute; inset: 0; pointer-events: none; }

        /* Sections */
        section { padding: 100px 10%; position: relative; }
        .section-header { text-align: center; margin-bottom: 80px; }
        .section-header h2 { font-size: 3rem; margin-bottom: 10px; }
        .breadcrumb { font-family: 'Cinzel', serif; font-size: 0.6rem; color: var(--gold-dark); margin-bottom: 40px; text-transform: uppercase; }

        /* Stones Grid */
        .stone-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .stone-card {
            background: var(--bg-secondary); border: 1px solid var(--border-gold);
            border-radius: 16px; padding: 40px 30px; transition: var(--transition);
            display: flex; flex-direction: column; position: relative;
        }
        .stone-card:hover { transform: translateY(-6px); border-color: var(--gold-primary); box-shadow: 0 15px 40px rgba(201,168,76,0.1); }
        .gem-swatch {
            width: 70px; height: 70px; border-radius: 50%; margin: 0 auto 30px;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), transparent);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5); transition: var(--transition);
        }
        .stone-card:hover .gem-swatch { transform: scale(1.1) rotate(15deg); animation: pulse-gem 2s infinite ease-in-out; }
        @keyframes pulse-gem { 50% { box-shadow: 0 0 25px var(--swatch-color); } }

        /* AI Section */
        .ai-container { 
            max-width: 900px; margin: 0 auto; background: var(--bg-secondary);
            border: 1px solid var(--border-gold); padding: 50px; border-radius: 16px;
        }
        .chips { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
        .chip { 
            padding: 8px 18px; border: 1px solid var(--border-gold); border-radius: 50px;
            cursor: pointer; font-family: 'Cinzel'; font-size: 0.65rem; color: var(--cream-dim);
            transition: var(--transition);
        }
        .chip.active { background: var(--gold-primary); color: var(--bg-primary); border-color: var(--gold-primary); }
        textarea {
            width:100%; height:120px; background:rgba(0,0,0,0.2); border:1px solid var(--border-gold);
            border-radius:12px; padding:20px; color:var(--cream); font-family:inherit; font-size:1.1rem;
            resize:none; margin-bottom:25px; transition:var(--transition);
        }
        textarea:focus { border-color: var(--gold-primary); background:rgba(255,255,255,0.05); }

        /* Side Panel */
        .side-panel {
            position: fixed; inset: 0 auto 0 auto; right: -400px; width: 380px;
            background: var(--bg-secondary); border-left: 1px solid var(--border-gold);
            z-index: 2000; transition: var(--transition); display: flex; flex-direction: column;
        }
        .side-panel.open { right: 0; }
        .panel-header { padding: 30px; border-bottom: 1px solid var(--border-gold); display: flex; justify-content: space-between; align-items: center; }
        .panel-content { flex-grow: 1; overflow-y: auto; padding: 30px; }
        .panel-footer { padding: 30px; border-top: 1px solid var(--border-gold); }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            z-index: 3000; display: none; justify-content: center; align-items: center;
            opacity: 0; transition: var(--transition);
        }
        .modal-overlay.open { display: flex; opacity: 1; }
        .modal-container {
            background: var(--bg-secondary); border: 1px solid var(--border-gold);
            border-radius: 16px; padding: 50px; width: 90%; max-width: 500px;
            transform: scale(0.95); transition: var(--transition);
        }
        .modal-overlay.open .modal-container { transform: scale(1); }

        /* Toasts */
        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 6000; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            padding: 15px 30px; background: var(--bg-tertiary); border: 1px solid var(--gold-primary);
            border-radius: 8px; font-family: 'Cinzel'; font-size: 0.7rem; letter-spacing: 0.1em;
            color: var(--gold-primary); animation: toast-in 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }
        @keyframes toast-in { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Forms */
        .field { margin-bottom: 20px; }
        .field label { display: block; font-family: 'Cinzel'; font-size: 0.6rem; color: var(--gold-primary); margin-bottom: 8px; }
        input, select { 
            width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-gold);
            border-radius: 8px; color: var(--cream); font-family: inherit; font-size: 0.9rem;
        }
        input:focus, select:focus { border-color: var(--gold-primary); background: rgba(255,255,255,0.05); }

        /* Footer */
        footer { background: var(--bg-secondary); padding: 80px 10% 40px; border-top: 1px solid var(--border-gold); }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            nav .nav-links { display: none; }
            section { padding: 60px 5%; }
            .side-panel { width: 100%; }
            .hero h1 { font-size: 2.8rem; }
            .footer-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

        function showView(view) {
            const main = document.getElementById('main-content');
            if(!main) return;
            
            // Start transition
            main.style.opacity = '0';
            
            setTimeout(() => {
                currentView = view;
                renderView();
                
                // End transition
                main.style.opacity = '1';
                window.scrollTo(0, 0);
                updateNav();
                
                // Update History
                history.pushState({view}, '', `#${view}`);
            }, 300);
        }

        function renderView() {
            const main = document.getElementById('main-content');
            if(!main) return;
            
            let html = '';
            switch(currentView) {
                case 'home': html = viewHome() || ''; break;
                case 'collection': html = viewCollection(); break;
                case 'wishlist': html = viewWishlist(); break;
                case 'checkout': html = viewCheckout(); break;

            return `

        function initHomeFeatures() {
            const c = document.getElementById('hero-canvas');
            if(!c) return;
            const x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            let stars = Array.from({length:80}, () => ({ x:Math.random()*c.width, y:Math.random()*c.height, s:Math.random()+0.5 }));
            function loop() {
                x.clearRect(0,0,c.width,c.height);
                x.fillStyle = '#C9A84C';
                stars.forEach(s => {
                    x.beginPath(); x.arc(s.x, s.y, s.s, 0, Math.PI*2); x.fill();
                    s.y += 0.1; if(s.y > c.height) s.y = 0;
                });
                requestAnimationFrame(loop);
            }
            loop();
        }

        function calculateCarat() {
            const sg = parseFloat(document.getElementById('calc-stone').value);
            const factor = parseFloat(document.getElementById('calc-shape').value);
            const l = parseFloat(document.getElementById('calc-l').value);
            const w = parseFloat(document.getElementById('calc-w').value);
            const d = parseFloat(document.getElementById('calc-d').value);
            
            if(!l || !w || !d) return;
            
            // Formula: L x W x D x Factor x (SG / 3.52)
            // 3.52 is SG of Diamond for which the factors are based
            let weight = l * w * d * factor * (sg / 3.52);
            
            document.getElementById('calc-result').innerText = weight.toFixed(2);
            // 1 Carat = 1.1 Ratti (approx in Vedic system)
            document.getElementById('calc-ratti').innerText = '(' + (weight * 1.1).toFixed(2) + ' Ratti)';
        }

        async function revealGemstone() {
            const input = document.getElementById('ai-prompt').value;
            const chips = Array.from(document.querySelectorAll('.chip.active')).map(c => c.innerText);
            if(!input && chips.length === 0) return alert("Select an aspiration.");

            const loader = document.getElementById('ai-loading');
            const result = document.getElementById('ai-result');
            loader.style.display = 'block'; result.style.display = 'none';

            // FALLBACK AS API REQUIRES KEY
            setTimeout(() => {
                const map = { 'Wealth': STONES[4], 'Love': STONES[5], 'Protection': STONES[2], 'Healing': STONES[1], 'Confidence': STONES[0], 'Success': STONES[6] };
                const match = map[chips[0]] || STONES[Math.floor(Math.random()*STONES.length)];
                loader.style.display = 'none'; result.style.display = 'block';
                result.innerHTML = `<h4 class="brand-font" style="color:var(--gold-primary); margin-bottom:15px;">Celestial Suggestion: ${match.name}</h4><p>${match.desc} Alignment suggests wearing this in ${match.metal} on the ${match.finger} finger.</p>`;
                typeWriterEffect(result.innerText, result);
            }, 1000);
        }

        function typeWriterEffect(text, el) {
            el.innerHTML = "";
            let i = 0;
            const timer = setInterval(() => {
                el.innerHTML += text[i]; i++;
                if(i >= text.length) clearInterval(timer);
            }, 15);
        }

        function updateNav() {
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            const active = document.getElementById(`nav-${currentView}`);
            if(active) active.classList.add('active');
        }

        function openAccount() { showView('account'); }

        window.onpopstate = (e) => {
            if(e.state && e.state.view) { currentView = e.state.view; renderView(); }
        };


        function renderFooter() {
            return `
                <footer>
                    <div class="footer-grid" style="display:grid; grid-template-columns:1.5fr 1fr 1fr; gap:60px;">
                        <div>
                            <div class="logo" style="margin-bottom:20px;">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" stroke="#C9A84C"/><text x="12" y="15.5" text-anchor="middle" fill="#C9A84C" font-size="10">N</text></svg>
                                <span class="brand-font">N&J's</span>
                            </div>
                            <p style="color:var(--cream-dim); font-size:0.9rem;">Destiny in Every Gem. Crafting cosmic alignment through sacred stones sejak 1987 in Jaipur.</p>
                        </div>
                        <div>
                            <h4 class="brand-font" style="color:var(--gold-primary); margin-bottom:20px;">Bespoke Services</h4>
                            <ul style="list-style:none; color:var(--cream-dim); font-size:0.9rem;">
                                <li><a href="javascript:void(0)" onclick="showView('custom-setting')">Custom Setting</a></li>
                                <li><a href="javascript:void(0)" onclick="showView('stone-care')">Stone Care</a></li>
                                <li><a href="javascript:void(0)" onclick="showView('gift-cards')">Gift Cards</a></li>
                            </ul>
                        </div>
                        <div>
                            <h4 class="brand-font" style="color:var(--gold-primary); margin-bottom:20px;">Contact</h4>
                            <p style="font-size:0.9rem; color:var(--cream-dim);">123 Jewellers Lane, Jaipur, RJ</p>
                            <p style="font-size:0.9rem; color:var(--cream-dim);">contact@nandjs.com</p>
                        </div>
                    </div>
                </footer>
            `;
        }

        // --- Core Logic ---

        function exitGate(target) {
            const gate = document.getElementById('splash-gate');
            gate.style.opacity = '0';
            sessionStorage.setItem('nj_visited', 'true');
            setTimeout(() => {
                gate.style.display = 'none';
                if(target === 'login') openModal('login');
                if(target === 'register') openModal('register');
                showView('home');
            }, 600);
        }

        function toggleCart() {
            document.getElementById('cart-panel').classList.toggle('open');
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            const footer = document.getElementById('cart-footer');
            if(cart.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:100px 0; opacity:0.5;">Empty Vault</div>`;
                footer.innerHTML = '';
                return;
            }
            container.innerHTML = cart.map(item => {
                const s = STONES.find(x=>x.id===item.id);
                return `
                    <div style="display:flex; gap:15px; margin-bottom:20px;">
                        <div style="width:40px; height:40px; border-radius:50%; background:${s.color};"></div>
                        <div style="flex-grow:1;">
                            <div style="font-weight:600;">${s.name}</div>
                            <div style="font-size:0.7rem; color:var(--gold-primary);">${s.ratti} Ratti • ₹${s.price.toLocaleString()}</div>
                        </div>
                        <button onclick="removeFromCart(${s.id})" style="background:none; border:none; color:#555; cursor:pointer;">&times;</button>
                    </div>
                `;
            }).join('');
            const subtotal = cart.reduce((acc, i) => acc + STONES.find(x=>x.id===i.id).price, 0);
            footer.innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-weight:700; color:var(--gold-primary);">
                    <span>Vault Total</span><span>₹${subtotal.toLocaleString()}</span>
                </div>
                <button class="btn-gold fill" style="width:100%;" onclick="startCheckout()">Proceed to Checkout</button>
            `;
            document.getElementById('cart-badge').innerText = cart.length;
        }

        function addToCart(id) {
            cart.push({id});
            showToast("Added to Vault \u2726");
            renderCart();
            toggleCart();
        }

        function showToast(msg) {
            const id = Date.now();
            const toast = `<div class="toast" id="toast-${id}">${msg}</div>`;
            document.getElementById('toast-container').innerHTML += toast;
            setTimeout(() => document.getElementById(`toast-${id}`)?.remove(), 3000);
        }

        function applyFilters(f, el) {
            if(el) {
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                el.classList.add('active');
            }
            const grid = document.getElementById('coll-grid');
            const filtered = f === 'All' ? STONES : STONES.filter(s => s.name === f);
            grid.innerHTML = filtered.map(s => renderStoneCard(s)).join('');
        }

        // --- Auth & Modals ---
        function openModal(type) {
            const overlay = document.getElementById('modal-overlay');
            const body = document.getElementById('modal-body');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('open'), 10);
            
            if(type === 'login') {
                body.innerHTML = `
                    <h2 style="text-align:center; margin-bottom:30px;">Enter the Vault</h2>
                    <div class="field"><label>Email Address</label><input type="email" id="login-email" placeholder="priya@example.com"></div>
                    <div class="field"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••"></div>
                    <button class="btn-gold fill" style="width:100%;" onclick="doAuth()">Sign In</button>
                `;
            }
        }
        function closeModal() {
            const overlay = document.getElementById('modal-overlay');
            overlay.classList.remove('open');
            setTimeout(() => overlay.style.display = 'none', 400);
        }

        function doAuth() {
            const email = document.getElementById('login-email').value;
            if(email === 'nikunjphophalia@gmail.com') window.location.href = 'admin.html';
            else {
                currentUser = { name: "Seeker", email };
                closeModal();
                showToast("Welcome to N&J's!");
            }
        }

        function initSplash() {
            const c = document.getElementById('splash-canvas');
            if(!c) return;
            const x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            let parts = Array.from({length:60}, () => ({ x:Math.random()*c.width, y:Math.random()*c.height, s:Math.random()+0.5 }));
            function loop() {
                x.clearRect(0,0,c.width,c.height);
                x.fillStyle = '#C9A84C';
                parts.forEach(p => {
                    x.beginPath(); x.arc(p.x, p.y, p.s, 0, Math.PI*2); x.fill();
                    p.y -= 0.2; if(p.y < 0) p.y = c.height;
                });
                requestAnimationFrame(loop);
            }
            loop();
        }

        // --- Lifecycle ---

        document.addEventListener('DOMContentLoaded', function() {
            if(sessionStorage.getItem('nj_visited')) {
                const gate = document.getElementById('splash-gate');
                if(gate) gate.style.display = 'none';
                renderView();
            } else {
                initSplash();
                renderView();
            }
            
            // Initial sync
            updateNav();

            // History / Popstate Support
            window.onpopstate = (e) => {
                if(e.state && e.state.view) {
                    currentView = e.state.view;
                    renderView();
                }
            };
        });
    </script>
</body>
