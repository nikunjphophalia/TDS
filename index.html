<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N&J's Jewellery | Destiny in Every Gem</title>
    <!-- SEO -->
    <meta name="description" content="Unlock the cosmic powers of Vedic Navratan stones. Handpicked, energized, and ethically sourced luxury gemstones from Jaipur.">
    
    <!-- Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-primary: #0A0705;
            --bg-secondary: #130E09;
            --bg-tertiary: #1C1610;
            --gold-primary: #C9A84C;
            --gold-light: #E8CB7A;
            --gold-dark: #8A6D2F;
            --cream: #F5EDD6;
            --cream-dim: #B8A98A;
            --ruby: #9B1C1C;
            --emerald: #1B4D3E;
            --sapphire: #1B2A6B;
            --pearl: #F0EDE5;
            --coral: #B55A3A;
            --topaz: #C47A1E;
            --hessonite: #8B4513;
            --cats-eye: #8B8000;
            --border-gold: rgba(201,168,76,0.25);
            --glow-gold: rgba(201,168,76,0.15);
            --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Reset & Base */
        * { margin:0; padding:0; box-sizing:border-box; outline:none; -webkit-tap-highlight-color:transparent; }
        body { 
            background: var(--bg-primary); color: var(--cream); 
            font-family: 'Cormorant Garamond', serif; line-height: 1.6;
            overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }

        /* SVG Grain Overlay */
        body::before {
            content:""; position:fixed; inset:0; z-index:9999; pointer-events:none; opacity:0.03;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3BaseFilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/baseFilter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        h1, h2, h3, h4 { font-family: 'Playfair Display', serif; font-weight: 400; }
        .brand-font { font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 0.15em; font-size: 0.75rem; }
        .btn-gold { 
            padding: 12px 30px; font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.2em;
            border-radius: 50px; cursor: pointer; transition: var(--transition); border: 1px solid var(--gold-primary);
            background: transparent; color: var(--gold-primary); text-decoration: none; display: inline-block;
        }
        .btn-gold.fill { background: var(--gold-primary); color: var(--bg-primary); }
        .btn-gold:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--glow-gold); }
        .btn-gold.fill:hover { background: var(--gold-light); transform: translateY(-2px); }
        .strength-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 8px; }
        .strength-bar div { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; transition: 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .active-profile-tab { border-left: 2px solid var(--gold-primary); padding-left: 15px; }

        /* Splash Gate */
        #splash-gate {
            position: fixed; inset: 0; z-index: 5000; background: var(--bg-primary);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; transition: opacity 0.6s ease;
        }
        #splash-canvas { position: absolute; inset: 0; pointer-events: none; }

        /* Navigation */
        nav {
            position: fixed; top: 0; width: 100%; height: 80px; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center; padding: 0 5%;
            background: rgba(10, 7, 5, 0.85); backdrop-filter: saturate(180%) blur(20px);
            transition: var(--transition);
        }
        nav.active { border-bottom: 1px solid var(--border-gold); }
        .logo { display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--cream); }
        .nav-links { display:flex; gap:35px; list-style:none; }
        .nav-links a { 
            text-decoration:none; color:var(--cream-dim); font-size:0.75rem; 
            letter-spacing:0.15em; font-family:'Cinzel', serif; position:relative; 
        }
        .nav-links a:hover, .nav-links a.active { color:var(--gold-primary); }
        .nav-links a::after {
            content:""; position:absolute; bottom:-5px; left:0; width:0; height:1px;
            background:var(--gold-primary); transition:var(--transition);
        }
        .nav-links a:hover::after { width:100%; }

        .nav-actions { display:flex; gap:20px; align-items:center; }
        .nav-icon { 
            background:none; border:none; color:var(--gold-primary); cursor:pointer; 
            position:relative; width:22px; height:22px; display:flex; align-items:center;
            transition: var(--transition);
        }
        .nav-icon:hover { color: var(--gold-light); transform: scale(1.1); }
        .badge {
            position:absolute; top:-8px; right:-8px; background:var(--ruby); color:white;
            font-size:0.6rem; width:16px; height:16px; border-radius:50%;
            display:flex; align-items:center; justify-content:center; font-family:'Cinzel', serif;
        }

        /* Views */
        #main-content { min-height: 100vh; padding-top: 80px; opacity: 1; transition: opacity 0.3s ease; }
        .view { display: none; width: 100%; }
        .view.active { display: block; animation: view-enter 0.5s ease forwards; }
        @keyframes view-enter {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hero */
        .hero { 
            height: calc(100vh - 80px); width:100%; display:flex; flex-direction:column;
            justify-content:center; align-items:center; text-align:center; position:relative;
            background: radial-gradient(circle at center, rgba(201,168,76,0.08) 0%, var(--bg-primary) 70%);
        }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); font-style: italic; margin-bottom: 20px; line-height: 1.1; }
        .hero p { font-size: 1.2rem; color: var(--cream-dim); max-width: 600px; margin-bottom: 40px; padding:0 20px; }
        #hero-canvas { position: absolute; inset: 0; pointer-events: none; }

        /* Sections */
        section { padding: 100px 10%; position: relative; }
        .section-header { text-align: center; margin-bottom: 80px; }
        .section-header h2 { font-size: 3rem; margin-bottom: 10px; }
        .breadcrumb { font-family: 'Cinzel', serif; font-size: 0.6rem; color: var(--gold-dark); margin-bottom: 40px; text-transform: uppercase; }

        /* Stones Grid */
        .stone-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .stone-card {
            background: var(--bg-secondary); border: 1px solid var(--border-gold);
            border-radius: 16px; padding: 40px 30px; transition: var(--transition);
            display: flex; flex-direction: column; position: relative;
        }
        .stone-card:hover { transform: translateY(-6px); border-color: var(--gold-primary); box-shadow: 0 15px 40px rgba(201,168,76,0.1); }
        .gem-swatch {
            width: 120px; height: 120px; margin: 0 auto 16px;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition); position: relative;
        }
        .stone-card:hover .gem-swatch { transform: scale(1.1) rotate(15deg); animation: pulse-gem 2s infinite ease-in-out; }
        @keyframes pulse-gem { 50% { filter: drop-shadow(0 0 15px var(--swatch-color)); } }

        /* AI Section */
        .ai-container { 
            max-width: 900px; margin: 0 auto; background: var(--bg-secondary);
            border: 1px solid var(--border-gold); padding: 50px; border-radius: 16px;
        }
        .chips { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
        .chip { 
            padding: 8px 18px; border: 1px solid var(--border-gold); border-radius: 50px;
            cursor: pointer; font-family: 'Cinzel'; font-size: 0.65rem; color: var(--cream-dim);
            transition: var(--transition);
        }
        .chip.active { background: var(--gold-primary); color: var(--bg-primary); border-color: var(--gold-primary); }
        textarea {
            width:100%; height:120px; background:rgba(0,0,0,0.2); border:1px solid var(--border-gold);
            border-radius:12px; padding:20px; color:var(--cream); font-family:inherit; font-size:1.1rem;
            resize:none; margin-bottom:25px; transition:var(--transition);
        }
        textarea:focus { border-color: var(--gold-primary); background:rgba(255,255,255,0.05); }

        /* Side Panel */
        .side-panel {
            position: fixed; inset: 0 auto 0 auto; right: -400px; width: 380px;
            background: var(--bg-secondary); border-left: 1px solid var(--border-gold);
            z-index: 2000; transition: var(--transition); display: flex; flex-direction: column;
        }
        .side-panel.open { right: 0; }
        .panel-header { padding: 30px; border-bottom: 1px solid var(--border-gold); display: flex; justify-content: space-between; align-items: center; }
        .panel-content { flex-grow: 1; overflow-y: auto; padding: 30px; }
        .panel-footer { padding: 30px; border-top: 1px solid var(--border-gold); }

        /* Modals */
        .modal-base {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 9999; opacity: 0; transition: var(--transition);
        }
        .modal-base.open { display: flex; opacity: 1; }
        .modal-container {
            background: var(--bg-secondary); border: 1px solid var(--border-gold);
            border-radius: 16px; padding: 50px; width: 90%; max-width: 500px;
            transform: scale(0.95); transition: var(--transition);
            max-height: 90vh; overflow-y: auto;
        }
        .modal-base.open .modal-container { transform: scale(1); }
        .error-inline { color: var(--ruby); font-size: 0.7rem; margin-top: 4px; height: 14px; }

        /* Toasts */
        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 6000; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            padding: 15px 30px; background: var(--bg-tertiary); border: 1px solid var(--gold-primary);
            border-radius: 8px; font-family: 'Cinzel'; font-size: 0.7rem; letter-spacing: 0.1em;
            color: var(--gold-primary); animation: toast-in 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }
        @keyframes toast-in { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Forms */
        .field { margin-bottom: 20px; }
        .field label { display: block; font-family: 'Cinzel'; font-size: 0.6rem; color: var(--gold-primary); margin-bottom: 8px; }
        input, select { 
            width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-gold);
            border-radius: 8px; color: var(--cream); font-family: inherit; font-size: 0.9rem;
        }
        input:focus, select:focus { border-color: var(--gold-primary); background: rgba(255,255,255,0.05); }

        /* Footer */
        footer { background: var(--bg-secondary); padding: 80px 10% 40px; border-top: 1px solid var(--border-gold); }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            nav .nav-links { display: none; }
            section { padding: 60px 5%; }
            .side-panel { width: 100%; }
            .hero h1 { font-size: 2.8rem; }
            .footer-grid { grid-template-columns: 1fr; }
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinner {
            width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--gold-primary); border-radius: 50%;
            animation: spin 0.8s linear infinite; display: inline-block;
        }
    </style>
</head>
<body>

    <!-- Splash Gate -->
    <div id="splash-gate">
        <canvas id="splash-canvas"></canvas>
        <div style="position:relative; z-index:10;">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" style="margin-bottom:30px;">
                <circle cx="12" cy="12" r="11" stroke="#C9A84C" stroke-width="0.5"/>
                <text x="12" y="16" text-anchor="middle" fill="#C9A84C" font-family="Cinzel" font-size="12" font-weight="bold">N</text>
            </svg>
            <h1 style="font-size:3rem; letter-spacing:10px; margin-bottom:10px;">N&J'S</h1>
            <p style="font-style:italic; color:var(--cream-dim); margin-bottom:30px;">Destiny in Every Gem</p>
            <div style="width:50px; height:1px; background:var(--gold-primary); margin:0 auto 40px;"></div>
            <div style="display:grid; gap:20px; justify-content:center; max-width:300px; margin:0 auto;">
                <button class="btn-gold fill" id="gateCreateAccountBtn" onclick="openRegisterModal()">Create Account</button>
                <div style="font-size:0.9rem; color:var(--cream-dim);">
                    Already have an account? <a href="javascript:void(0)" onclick="openSignInModal()" style="color:var(--gold-primary); text-decoration:none; font-weight:bold;">Sign In</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav id="navbar">
        <a href="javascript:void(0)" onclick="showView('home')" class="logo">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="11" stroke="#C9A84C" stroke-width="0.8"/>
                <text x="12" y="15.5" text-anchor="middle" fill="#C9A84C" font-family="Cinzel" font-size="10" font-weight="bold">N</text>
            </svg>
            <span class="brand-font" style="font-size:1rem; letter-spacing:0.4em;">N&J'S</span>
        </a>
        <ul class="nav-links">
            <li><a href="javascript:void(0)" onclick="showView('collection')" id="nav-collection">Collection</a></li>
            <li><a href="javascript:void(0)" onclick="showView('ai')" id="nav-ai">AI Match</a></li>
            <li><a href="javascript:void(0)" onclick="showView('heritage')" id="nav-heritage">Carat Calc & History</a></li>
            <li><a href="javascript:void(0)" onclick="showView('query')" id="nav-query">Enquiry</a></li>
            <li><a href="javascript:void(0)" onclick="showView('about')" id="nav-about">About</a></li>
        </ul>
        <div class="nav-actions">
            <button class="nav-icon" onclick="showView('wishlist')" aria-label="Wishlist">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
                <span class="badge" id="wishlist-badge">0</span>
            </button>
            <button class="nav-icon" onclick="openSignInModal()" aria-label="Profile">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </button>
            <button class="nav-icon" onclick="toggleCart()" aria-label="Cart/Vault">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6z"/><path d="M3 6h18M16 10a4 4 0 01-8 0"/></svg>
                <span class="badge" id="cart-badge">0</span>
            </button>
        </div>
    </nav>

    <!-- Main Views Container -->
    <main id="main-content">
        <!-- Views will be injected here -->
    </main>

    <!-- Cart Panel -->
    <div id="cart-panel" class="side-panel">
        <div class="panel-header">
            <div style="display:flex; align-items:center; gap:10px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gold-primary)"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                <h3 class="brand-font">Your Vault</h3>
            </div>
            <button class="nav-icon" onclick="toggleCart()" style="font-size:2rem;">&times;</button>
        </div>
        <div class="panel-content" id="cart-items">
            <!-- Items via JS -->
        </div>
        <div class="panel-footer" id="cart-footer">
            <!-- Total & Checkout via JS -->
        </div>
    </div>

    <!-- Registration Modal -->
    <div id="registerModal" class="modal-base" onclick="if(event.target===this) closeRegisterModal()">
        <div class="modal-container" id="modal-container-inner-reg">
            <h2 class="brand-font" style="text-align:center; margin-bottom:20px; letter-spacing:2px;">Join the Sanctuary</h2>
            <div id="regGeneralError" style="color:var(--ruby); margin-bottom:10px; font-size:0.8rem; text-align:center;"></div>
            
            <div class="field">
                <label>Full Name *</label><input type="text" id="regName" placeholder="Priya Sharma">
                <div class="error-inline" id="regNameError"></div>
            </div>
            <div class="field">
                <label>Email Address *</label><input type="email" id="regEmail" placeholder="email@example.com">
                <div class="error-inline" id="regEmailError"></div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                <div class="field">
                    <label>Phone *</label><input type="text" id="regPhone" placeholder="98XXXXXXXX">
                    <div class="error-inline" id="regPhoneError"></div>
                </div>
                <div class="field">
                    <label>DOB *</label><input type="date" id="regDob">
                    <div class="error-inline" id="regDobError"></div>
                </div>
            </div>
            <div class="field">
                <label>Password *</label>
                <input type="password" id="regPassword" oninput="checkStrength(this.value, 'reg-strength')">
                <div id="reg-strength" class="strength-bar"><div></div><div></div><div></div><div></div></div>
                <div class="error-inline" id="regPasswordError"></div>
            </div>
            <div class="field">
                <label>Confirm Password *</label><input type="password" id="regConfirmPassword">
                <div class="error-inline" id="regConfirmPasswordError"></div>
            </div>
            
            <button class="btn-gold fill" style="width:100%;" id="regSubmitBtn" onclick="handleRegister()">Create Account</button>

            <div style="text-align:center; margin:20px 0; color:var(--cream-dim); position:relative;">
                <span style="background:var(--bg-secondary); padding:0 15px; position:relative; z-index:2;">or</span>
                <div style="position:absolute; top:50%; left:0; width:100%; height:1px; background:rgba(201,168,76,0.2);"></div>
            </div>

            <button class="btn-gold" style="width:100%; background:white; color:#0A0705; display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:20px;" id="regGoogleBtn" onclick="handleGoogleSignIn()">
                <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.706c-.18-.54-.282-1.114-.282-1.706s.102-1.166.282-1.706V4.962H.957a8.996 8.996 0 000 8.076l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.443 2.048.957 4.962L3.964 7.294C4.672 5.167 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
                Sign up with Google
            </button>

            <div style="text-align:center; font-size:0.9rem; color:var(--cream-dim);">
                Already have an account? <a href="javascript:void(0)" onclick="closeRegisterModal(); openSignInModal();" style="color:var(--gold-primary); text-decoration:none; font-weight:bold;">Sign In →</a>
            </div>
        </div>
    </div>

    <!-- Sign In Modal -->
    <div id="signInModal" class="modal-base" onclick="if(event.target===this) closeSignInModal()">
        <div class="modal-container" id="modal-container-inner-login">
            <h2 class="brand-font" style="text-align:center; margin-bottom:30px; letter-spacing:2px;">Collector Sign In</h2>
            <div id="signInError" style="color:var(--ruby); margin-bottom:20px; font-size:0.9rem; text-align:center;"></div>
            
            <div id="login-form">
                <div class="field"><label>Email Address</label><input type="email" id="login-email" placeholder="priya@example.com"></div>
                <div class="field" style="position:relative;">
                    <label>Password</label>
                    <input type="password" id="login-pass" placeholder="••••••••">
                    <span onclick="togglePass('login-pass', this)" style="position:absolute; right:15px; top:40px; cursor:pointer; color:var(--cream-dim);"><i class="fas fa-eye"></i></span>
                </div>
                <div style="text-align:right; margin-bottom:20px;"><a href="javascript:void(0)" onclick="showForgot()" style="color:var(--gold-primary); font-size:0.8rem; text-decoration:none;">Forgot Password?</a></div>
                <button class="btn-gold fill" style="width:100%;" id="btn-login" onclick="doEmailLogin()">Sign In</button>
            </div>

            <div id="forgot-form" style="display:none;">
                <div style="margin-bottom:20px;"><a href="javascript:void(0)" onclick="hideForgot()" style="color:var(--cream-dim); font-size:0.8rem; text-decoration:none;"><i class="fas fa-arrow-left"></i> Back</a></div>
                <div class="field"><label>Email Address</label><input type="email" id="reset-email" placeholder="priya@example.com"></div>
                <div id="reset-msg" style="color:#1B4D3E; margin-bottom:20px; font-size:0.9rem; display:none;"></div>
                <button class="btn-gold fill" style="width:100%;" id="btn-reset" onclick="doResetPassword()">Send Reset Link</button>

        function updateCardPrice(id) {
            const card = document.querySelector(`.stone-card[data-id="${id}"]`);
            if(!card) return;
            const s = STONES.find(x => x.id === id);
            const weight = parseFloat(card.querySelector('.card-weight').value);
            const priceEl = card.querySelector('.card-price');
            const total = s.baseRate * weight;
            priceEl.innerText = `₹${total.toLocaleString()}`;
        }

        function calculateCarat() {
            const sg = parseFloat(document.getElementById('calc-stone').value);
            const factor = parseFloat(document.getElementById('calc-shape').value);
            const l = parseFloat(document.getElementById('calc-l').value);
            const w = parseFloat(document.getElementById('calc-w').value);
            const d = parseFloat(document.getElementById('calc-d').value);
            
            if(!l || !w || !d) return;
            
            let weight = l * w * d * factor * (sg / 3.52);
            
            document.getElementById('calc-result').innerText = weight.toFixed(2);
            document.getElementById('calc-ratti').innerText = '(' + (weight * 1.1).toFixed(2) + ' Ratti)';
        }

        async function handleRegister() {
            document.getElementById('regGeneralError').textContent = '';
            
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const dob = document.getElementById('regDob').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            let valid = true;

            if (name.length < 2) {
                document.getElementById('regNameError').textContent = 'Name must be at least 2 characters.';
                valid = false;
            } else { document.getElementById('regNameError').textContent = ''; }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                document.getElementById('regEmailError').textContent = 'Enter a valid email address.';
                valid = false;
            } else { document.getElementById('regEmailError').textContent = ''; }

            if (!/^[6-9]\d{9}$/.test(phone)) {
                document.getElementById('regPhoneError').textContent = 'Enter a valid 10-digit Indian mobile number.';
                valid = false;
            } else { document.getElementById('regPhoneError').textContent = ''; }

            const dobDate = new Date(dob);
            const today = new Date();
            const ageYear = today.getFullYear() - dobDate.getFullYear();
            const monthDiff = today.getMonth() - dobDate.getMonth();
            const actualAge = monthDiff < 0 || (monthDiff === 0 && today.getDate() < dobDate.getDate()) ? ageYear - 1 : ageYear;
            if (!dob || actualAge < 18) {
                document.getElementById('regDobError').textContent = 'You must be 18 or older to register.';
                valid = false;
            } else { document.getElementById('regDobError').textContent = ''; }

            const passRegex = /^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
            if (!passRegex.test(password)) {
                document.getElementById('regPasswordError').textContent = 'Min 8 chars with 1 uppercase, 1 number, 1 special character (@$!%*?&).';
                valid = false;
            } else { document.getElementById('regPasswordError').textContent = ''; }

            if (password !== confirmPassword) {
                document.getElementById('regConfirmPasswordError').textContent = 'Passwords do not match.';
                valid = false;
            } else { document.getElementById('regConfirmPasswordError').textContent = ''; }

            if (!valid) { shakeModalReg(); return; }

            const btn = document.getElementById('regSubmitBtn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Creating...';

            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                await userCredential.user.updateProfile({ displayName: name });
                userProfiles = userProfiles || {};
                userProfiles[userCredential.user.uid] = { phone, dob };
                localStorage.setItem('nj_user_profiles', JSON.stringify(userProfiles));
                closeRegisterModal();
                showToast('Welcome to Nikunj, ' + name + '! \u2726');
            } catch (err) {
                const errorMap = {
                    'auth/email-already-in-use': 'An account with this email already exists. Sign in instead.',
                    'auth/weak-password': 'Password is too weak.',
                    'auth/invalid-email': 'Please enter a valid email address.'
                };
                document.getElementById('regGeneralError').textContent = errorMap[err.code] || err.message;
                shakeModalReg();
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }

        async function handleEnquirySubmit() {

          // ── Get values ──────────────────────────────────────────
          const name            = document.getElementById('enquiryName').value.trim();
          const email           = document.getElementById('enquiryEmail').value.trim();
          const phone           = document.getElementById('enquiryPhone').value.trim();
          const consultationType= document.getElementById('enquiryType').value;
          const message         = document.getElementById('enquiryMessage').value.trim();
          const btn             = document.getElementById('enquirySubmitBtn');
          const successEl       = document.getElementById('enquirySuccess');
          const generalErrorEl  = document.getElementById('enquiryGeneralError');

          // ── Clear previous messages ──────────────────────────────
          ['enquiryNameError','enquiryEmailError',
           'enquiryPhoneError','enquiryMessageError'].forEach(function(id) {
            const el = document.getElementById(id);
            if (el) el.textContent = '';
          });
          if (successEl)      { successEl.style.display = 'none';      successEl.textContent = '';      }
          if (generalErrorEl) { generalErrorEl.style.display = 'none'; generalErrorEl.textContent = ''; }

          // ── Validate ─────────────────────────────────────────────
          let valid = true;

          if (name.length < 2) {
            document.getElementById('enquiryNameError').textContent = 'Please enter your full name.';
            valid = false;
          }

          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            document.getElementById('enquiryEmailError').textContent = 'Enter a valid email address.';
            valid = false;
          }

          if (!/^[6-9]\d{9}$/.test(phone.replace(/[\s\-\+]/g, ''))) {
            document.getElementById('enquiryPhoneError').textContent = 'Enter a valid 10-digit Indian mobile number.';
            valid = false;
          }

          if (message.length < 10) {
            document.getElementById('enquiryMessageError').textContent = 'Please describe your enquiry (min 10 characters).';
            valid = false;
          }

          if (!valid) return;

          // ── Loading state ────────────────────────────────────────
          btn.disabled = true;
          const originalBtnText = btn.textContent;
          btn.textContent = 'Sending...';

          // ── Build payload ────────────────────────────────────────
          const payload = {
            name:             name,
            email:            email,
            phone:            phone,
            consultationType: consultationType,
            message:          message,
            submittedAt:      new Date().toLocaleString('en-IN', {
                                timeZone:  'Asia/Kolkata',
                                dateStyle: 'medium',
                                timeStyle: 'short'
                              })
          };

          // ── Make webhook URL ─────────────────────────────────────
          const MAKE_WEBHOOK_URL = 'https://hook.eu1.make.com/9lr8deokjomrik4lb599d8wbynh3zeuf';
          // Example: 'https://hook.eu2.make.com/xxxxxxxxxxxxxxxxxx'

          try {
            const response = await fetch(MAKE_WEBHOOK_URL, {
              method:  'POST',
              headers: { 'Content-Type': 'application/json' },
              body:    JSON.stringify(payload)
            });

            // Make returns plain text "Accepted" on success
            const responseText = await response.text();
            const isSuccess = response.ok || responseText.toLowerCase().includes('accepted');

            if (isSuccess) {

              // Clear all form fields
              document.getElementById('enquiryName').value    = '';
              document.getElementById('enquiryEmail').value   = '';
              document.getElementById('enquiryPhone').value   = '';
              document.getElementById('enquiryMessage').value = '';

              // Show inline success message
              if (successEl) {
                successEl.style.cssText = 'display:block;color:#C9A84C;font-family:"Cormorant Garamond",serif;font-size:16px;margin-top:16px;text-align:center;padding:14px 20px;border:1px solid rgba(201,168,76,0.35);border-radius:10px;background:rgba(201,168,76,0.06);';
                successEl.textContent = '✦ Enquiry received. Nikunj will contact you within 24 hours.';
              }

              // Also save to Firestore if available
              if (typeof db !== 'undefined') {
                try {
                  await db.collection('enquiries').add(
                    Object.assign({}, payload, {
                      userId:      (loggedInUser && loggedInUser.uid) || 'guest',
                      submittedAt: firebase.firestore.FieldValue.serverTimestamp()
                    })
                  );
                } catch (firestoreErr) {
                  console.warn('Firestore enquiry save failed:', firestoreErr);
                }
              }

              // Show toast notification
              showToast('Enquiry sent successfully! We will be in touch soon. ✦', 'success');

            } else {
              throw new Error('Unexpected response: ' + responseText);
            }

          } catch (err) {
            console.error('Enquiry error:', err);

            if (generalErrorEl) {
              generalErrorEl.style.cssText = 'display:block;color:#9B1C1C;font-family:"Cormorant Garamond",serif;font-size:14px;margin-top:12px;text-align:center;';
              generalErrorEl.textContent = 'Unable to send enquiry. Please try again or email us directly at contact@nikunj.com';
            }

            showToast('Something went wrong. Please try again.', 'error');

          } finally {
            btn.disabled      = false;
            btn.textContent   = originalBtnText;
          }
        }

            if(!c) return;
            const x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            let parts = Array.from({length:60}, () => ({ x:Math.random()*c.width, y:Math.random()*c.height, s:Math.random()+0.5 }));
            function loop() {
                x.clearRect(0,0,c.width,c.height);
                x.fillStyle = '#C9A84C';
                parts.forEach(p => {
                    x.beginPath(); x.arc(p.x, p.y, p.s, 0, Math.PI*2); x.fill();
                    p.y -= 0.2; if(p.y < 0) p.y = c.height;
                });
                requestAnimationFrame(loop);
            }
            loop();
        }

        // --- Lifecycle ---

        document.addEventListener('DOMContentLoaded', function() {
            console.log("N&J'S: DOM Content Loaded. Attaching listeners...");
            if (!auth) { console.error("N&J'S: Auth not initialized. Site behavior will be limited."); return; }
            
            auth.onAuthStateChanged(function(user) {
                console.log("N&J'S: Auth State Changed. User:", user ? user.email : "Guest");
                if (user) {
                    loggedInUser = {
                        name: user.displayName || user.email.split('@')[0],
                        email: user.email,
                        uid: user.uid,
                        photo: user.photoURL
                    };
                    hideGateScreen();
                    updateNavForLoggedInUser();
                    if (user.email === "nikunjphophalia@gmail.com") {
                        window.location.href = "admin.html";
                    }
                    renderView();
                } else {
                    loggedInUser = null;
                    showGateScreen();
                    updateNavForLoggedOutUser();
                    renderView();
                }
            });
            
            // Initial sync
            updateNav();

            window.onpopstate = (e) => {
                if(e.state && e.state.view) {
                    currentView = e.state.view;
                    renderView();
                }
            };
            
            // Wire enquiry button if it exists (for dynamic rendering support)
            const enquiryBtn = document.getElementById('enquirySubmitBtn');
            if (enquiryBtn) {
                enquiryBtn.addEventListener('click', handleEnquirySubmit);
            }
        });
    </script>
</body>
</html>
